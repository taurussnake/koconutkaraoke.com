<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koconut Karaoke — The Cutest Way to Karaoke</title>
  <meta name="description" content="Create karaoke playlists, sing with friends, and cast to your TV. Free web app — mobile apps coming soon!">
  <meta property="og:title" content="Koconut Karaoke">
  <meta property="og:description" content="Create karaoke playlists, sing with friends, and cast to your TV.">
  <meta property="og:image" content="https://koconutkaraoke.com/koconut_home_image.jpeg">
  <meta property="og:url" content="https://koconutkaraoke.com">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="koconut_logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #3D3D3D;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: linear-gradient(180deg, #FFF8E7 0%, #FFE4EC 50%, #FFF8DC 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px 40px;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 481px) {
      .page { box-shadow: 0 0 40px rgba(0,0,0,0.3); }
    }

    .hero-image {
      width: 100%;
      max-width: 360px;
      border-radius: 24px;
      margin-top: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .title-logo {
      width: 75%;
      max-width: 280px;
      margin-top: 20px;
      animation: pulsate 2s ease-in-out infinite;
    }

    @keyframes pulsate {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }

    .tagline {
      font-size: 1.1rem;
      font-weight: 600;
      color: #824d2c;
      text-align: center;
      margin-top: 12px;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
      width: 100%;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.7);
      border-radius: 14px;
      padding: 12px 16px;
    }

    .feature-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }

    .feature-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: #5A3E5A;
    }

    .cta-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 48px;
      background: linear-gradient(135deg, #FFB6C8, #FF7F7F);
      color: white;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: inherit;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(255,127,127,0.4);
    }

    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,127,127,0.5);
    }

    .cta-btn:active {
      transform: scale(0.96);
    }

    .app-badges {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      align-items: center;
    }

    .app-badge {
      height: 40px;
      opacity: 0.4;
      border-radius: 8px;
    }

    .coming-soon {
      font-size: 0.8rem;
      color: #999;
      margin-top: 8px;
      font-weight: 600;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
    }

    .koppy-mini {
      width: 32px;
      vertical-align: middle;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="page">
    <img src="koconut_home_image.jpeg" alt="Koppy and friends on the beach" class="hero-image">

    <img src="koconut_title_logo.png" alt="Koconut Karaoke" class="title-logo">

    <p class="tagline">The cutest way to karaoke with friends</p>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">&#127925;</span>
        <span class="feature-text">Build playlists from YouTube karaoke videos</span>
      </div>
      <div class="feature">
        <span class="feature-icon">&#128250;</span>
        <span class="feature-text">Cast to your TV with Chromecast</span>
      </div>
      <div class="feature">
        <span class="feature-icon">&#128279;</span>
        <span class="feature-text">Share playlists with friends</span>
      </div>
      <div class="feature">
        <span class="feature-icon">&#127796;</span>
        <span class="feature-text">Free to use — no ads, no limits</span>
      </div>
    </div>

    <a href="https://app.koconutkaraoke.com" class="cta-btn">Open App</a>

    <p class="coming-soon">Mobile apps coming soon</p>

    <div class="footer">
      <img src="koconut_logo.png" alt="" class="koppy-mini">
      &copy; 2026 Koconut Karaoke
    </div>
  </div>
</body>
</html>
